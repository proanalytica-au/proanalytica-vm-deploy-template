services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: {{APP_NAME}}-dev
    env_file:
      - .env.local
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - web_internal

  # ── Optional: add Postgres, Redis, etc. ──
