services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: {{APP_NAME}}-prod
    env_file:
      - .env.prod
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - web_internal

  # ── Optional: Postgres ──
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: {{APP_NAME}}-prod-db
  #   environment:
  #     POSTGRES_DB: ${POSTGRES_DB}
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   volumes:
  #     - {{APP_NAME}}_postgres:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s
  #   restart: unless-stopped
  #   networks:
  #     - web_internal

  proxy:
    image: nginx:alpine
    container_name: {{APP_NAME}}-prod-proxy
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${PROXY_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-prod-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_PATH:-./certs/origin.crt}:/etc/nginx/certs/origin.crt:ro
      - ${SSL_KEY_PATH:-./certs/origin.key}:/etc/nginx/certs/origin.key:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - web_internal

networks:
  web_internal:
    driver: bridge

